<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prés Gaillard - Agent Virtuel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            max-height: 800px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Language Modal */
        .language-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .language-modal.hidden {
            display: none;
        }

        .language-modal-content {
            background: white;
            border-radius: 12px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 400px;
        }

        .language-modal-content h2 {
            margin-bottom: 10px;
            color: #333;
            font-size: 24px;
        }

        .language-modal-content p {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .language-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
        }

        .lang-btn {
            padding: 20px 10px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            font-weight: 500;
        }

        .lang-btn:hover {
            border-color: #1b5e20;
            background: #f0f8f5;
            transform: translateY(-2px);
        }

        .lang-btn .flag {
            font-size: 32px;
            margin-bottom: 8px;
            display: block;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1b5e20 0%, #2d7a2f 100%);
            color: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .header-content h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .header-content p {
            font-size: 12px;
            opacity: 0.9;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
            animation: pulse 2s infinite;
        }

        .lang-selector {
            font-size: 18px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .lang-selector:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-area::-webkit-scrollbar {
            width: 6px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        /* Messages */
        .message {
            display: flex;
            margin-bottom: 8px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.host {
            justify-content: flex-start;
        }

        .message.user {
            justify-content: flex-end;
        }

        .bubble {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 15px;
        }

        .message.host .bubble {
            background: #1b5e20;
            color: white;
            border-radius: 18px 18px 18px 4px;
        }

        .message.user .bubble {
            background: #e9ecef;
            color: #333;
            border-radius: 18px 18px 4px 18px;
        }

        /* Shortcuts */
        .shortcuts {
            padding: 0 20px 16px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .shortcuts.hidden {
            display: none;
        }

        .shortcut-btn {
            padding: 10px 12px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            color: #333;
            font-weight: 500;
        }

        .shortcut-btn:hover {
            background: #1b5e20;
            color: white;
            border-color: #1b5e20;
            transform: translateY(-2px);
        }

        .shortcut-btn.suggested {
            background: #fff3cd;
            border-color: #ffc107;
        }

        .shortcut-btn.suggested:hover {
            background: #ffc107;
            color: #333;
        }

        /* Input Area */
        .input-area {
            border-top: 1px solid #eee;
            padding: 12px 16px;
            background: #fafafa;
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            background: white;
            border: 1px solid #ddd;
            border-radius: 24px;
            padding: 0 16px;
            transition: border-color 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: #1b5e20;
            box-shadow: 0 0 0 2px rgba(27, 94, 32, 0.1);
        }

        textarea {
            flex: 1;
            border: none;
            outline: none;
            padding: 10px 0;
            resize: none;
            max-height: 100px;
            font-family: inherit;
            font-size: 15px;
            background: transparent;
            color: #333;
        }

        textarea::placeholder {
            color: #aaa;
        }

        .send-btn {
            background: #1b5e20;
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            background: #0d3d1a;
            transform: scale(1.1);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .loading span {
            width: 8px;
            height: 8px;
            background: #1b5e20;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .loading span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% { opacity: 0.5; transform: translateY(0); }
            40% { opacity: 1; transform: translateY(-8px); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                max-height: 100vh;
                border-radius: 0;
            }

            .bubble {
                max-width: 90%;
            }

            .shortcuts {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Language Modal -->
    <div class="language-modal" id="languageModal">
        <div class="language-modal-content">
            <h2 id="langTitle">Choose Language</h2>
            <p id="langSubtitle">Bienvenue · Welkom · Welcome</p>
            <div class="language-buttons">
                <button class="lang-btn" data-lang="fr">
                    <span class="flag">🇫🇷</span>
                    Français
                </button>
                <button class="lang-btn" data-lang="nl">
                    <span class="flag">🇳🇱</span>
                    Nederlands
                </button>
                <button class="lang-btn" data-lang="en">
                    <span class="flag">🇬🇧</span>
                    English
                </button>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-content">
                <h1>Prés Gaillard</h1>
                <p id="headerSubtitle">Gîte à La Bresse</p>
            </div>
            <div class="header-right">
                <div class="status">
                    <div class="status-dot"></div>
                    <span id="statusText">En ligne</span>
                </div>
                <button class="lang-selector" id="langBtn" title="Change language">🇫🇷</button>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area" id="chatArea"></div>

        <!-- Shortcuts -->
        <div class="shortcuts" id="shortcuts"></div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="messageInput" placeholder="Votre message..." rows="1"></textarea>
            </div>
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
    </div>

    <script>
        // Translations
        const translations = {
            fr: {
                headerSubtitle: "Gîte à La Bresse",
                statusText: "En ligne",
                placeholder: "Votre message...",
                langTitle: "Choisir la langue",
                langSubtitle: "Bienvenue · Welkom · Welcome",
                welcome: "🏔️ Bienvenue à Prés Gaillard ! Profitez de votre séjour en montagne. Comment puis-je vous aider ?",
                welcomeWinter: "🎄 Bienvenue à Prés Gaillard ! Passez un merveilleux séjour hivernal. Comment puis-je vous aider ?",
                welcomeSummer: "☀️ Bienvenue à Prés Gaillard ! Profitez de l'été en montagne. Comment puis-je vous aider ?",
                welcomeAutumn: "🍂 Bienvenue à Prés Gaillard ! Les couleurs d'automne sont magnifiques. Comment puis-je vous aider ?"
            },
            nl: {
                headerSubtitle: "Chalet in La Bresse",
                statusText: "Online",
                placeholder: "Uw bericht...",
                langTitle: "Taal kiezen",
                langSubtitle: "Bienvenue · Welkom · Welcome",
                welcome: "🏔️ Welkom bij Prés Gaillard! Geniet van uw verblijf in de bergen. Hoe kan ik u helpen?",
                welcomeWinter: "🎄 Welkom bij Prés Gaillard! Een heerlijk winterverblijf. Hoe kan ik u helpen?",
                welcomeSummer: "☀️ Welkom bij Prés Gaillard! Geniet van de zomer in de bergen. Hoe kan ik u helpen?",
                welcomeAutumn: "🍂 Welkom bij Prés Gaillard! De herfstkleurenzijn prachtig. Hoe kan ik u helpen?"
            },
            en: {
                headerSubtitle: "Chalet in La Bresse",
                statusText: "Online",
                placeholder: "Your message...",
                langTitle: "Choose Language",
                langSubtitle: "Bienvenue · Welkom · Welcome",
                welcome: "🏔️ Welcome to Prés Gaillard! Enjoy your mountain stay. How can I help?",
                welcomeWinter: "🎄 Welcome to Prés Gaillard! Have a wonderful winter stay. How can I help?",
                welcomeSummer: "☀️ Welcome to Prés Gaillard! Enjoy the summer in the mountains. How can I help?",
                welcomeAutumn: "🍂 Welcome to Prés Gaillard! The autumn colors are beautiful. How can I help?"
            }
        };

        const defaultQuestions = {
            fr: {
                arrival: ["🔑 Comment fonctionne le check-in ?", "🔑 Où sont les clés ?", "📱 Comment accéder au WiFi ?"],
                stay: ["🏔️ Quelles activités à La Bresse ?", "🍽️ Où manger à proximité ?", "🆘 Que faire en cas d'urgence ?"],
                departure: ["🧹 Comment préparer le départ ?", "📞 Qui contacter après ?", "⭐ Comment laisser un avis ?"]
            },
            nl: {
                arrival: ["🔑 Hoe werkt de check-in ?", "🔑 Waar zijn de sleutels ?", "📱 Hoe WiFi-toegang krijgen ?"],
                stay: ["🏔️ Welke activiteiten in La Bresse ?", "🍽️ Waar eten in de buurt ?", "🆘 Wat doen in geval van nood ?"],
                departure: ["🧹 Hoe vertrekken voorbereiding ?", "📞 Wie contacteren na ?", "⭐ Hoe een review achterlaten ?"]
            },
            en: {
                arrival: ["🔑 How does check-in work?", "🔑 Where are the keys?", "📱 How to access WiFi?"],
                stay: ["🏔️ What activities in La Bresse?", "🍽️ Where to eat nearby?", "🆘 What to do in case of emergency?"],
                departure: ["🧹 How to prepare departure?", "📞 Who to contact after?", "⭐ How to leave a review?"]
            }
        };

        let currentLanguage = localStorage.getItem('chatLanguage') || null;
        const chatArea = document.getElementById('chatArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const shortcuts = document.getElementById('shortcuts');
        const languageModal = document.getElementById('languageModal');
        const langBtn = document.getElementById('langBtn');

        let isLoading = false;
        let hasInteracted = false;
        let questionHistory = JSON.parse(localStorage.getItem('questionHistory') || '[]');

        // Initialize
        function init() {
            if (!currentLanguage) {
                languageModal.classList.remove('hidden');
                document.querySelectorAll('.lang-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        setLanguage(e.target.closest('.lang-btn').dataset.lang);
                    });
                });
            } else {
                initChat();
            }
        }

        function setLanguage(lang) {
            currentLanguage = lang;
            localStorage.setItem('chatLanguage', lang);
            languageModal.classList.add('hidden');
            updateUI();
            initChat();
        }

        function updateUI() {
            const t = translations[currentLanguage];
            document.getElementById('headerSubtitle').textContent = t.headerSubtitle;
            document.getElementById('statusText').textContent = t.statusText;
            messageInput.placeholder = t.placeholder;
            langBtn.textContent = { fr: '🇫🇷', nl: '🇳🇱', en: '🇬🇧' }[currentLanguage];
        }

        function initChat() {
            updateUI();
            loadWelcomeMessage();
            updateShortcuts();
            messageInput.focus();
        }

        // Auto-resize textarea
        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 100) + 'px';
        });

        // Send on Enter
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);
        langBtn.addEventListener('click', () => {
            currentLanguage = null;
            localStorage.removeItem('chatLanguage');
            chatArea.innerHTML = '';
            questionHistory = [];
            localStorage.removeItem('questionHistory');
            hasInteracted = false;
            init();
        });

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isLoading) return;

            addMessage(message, 'user');
            questionHistory.push({ q: message, t: Date.now() });
            localStorage.setItem('questionHistory', JSON.stringify(questionHistory));

            messageInput.value = '';
            messageInput.style.height = 'auto';
            isLoading = true;
            sendBtn.disabled = true;

            if (!hasInteracted) {
                shortcuts.classList.add('hidden');
                hasInteracted = true;
            }

            const loadingId = addMessage('', 'host', true);

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message,
                        language: currentLanguage,
                        questionHistory: questionHistory.map(h => h.q)
                    })
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();
                removeMessage(loadingId);

                if (data.error) {
                    addMessage('Erreur: ' + data.error, 'host');
                } else {
                    addMessage(data.reply, 'host');
                    updateShortcuts();
                }
            } catch (error) {
                removeMessage(loadingId);
                addMessage('Une erreur s\'est produite. Veuillez réessayer.', 'host');
                console.error('Error:', error);
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        function updateShortcuts() {
            shortcuts.innerHTML = '';

            const allQuestions = defaultQuestions[currentLanguage];
            const askedQuestions = questionHistory.map(h => h.q.toLowerCase());

            // Pick questions that haven't been asked much
            const availableQuestions = [];
            for (const phase in allQuestions) {
                for (const q of allQuestions[phase]) {
                    if (!askedQuestions.some(asked => q.toLowerCase().includes(asked.split(' ')[0]))) {
                        availableQuestions.push(q);
                    }
                }
            }

            // Show 4 random available questions
            const selected = availableQuestions.sort(() => Math.random() - 0.5).slice(0, 4);

            selected.forEach(q => {
                const btn = document.createElement('button');
                btn.className = 'shortcut-btn';
                btn.textContent = q;
                btn.addEventListener('click', () => {
                    messageInput.value = q;
                    sendMessage();
                });
                shortcuts.appendChild(btn);
            });
        }

        function addMessage(text, sender, isLoading = false) {
            const messageEl = document.createElement('div');
            messageEl.className = `message ${sender}`;
            messageEl.id = 'msg-' + Date.now() + Math.random();

            if (isLoading) {
                messageEl.innerHTML = '<div class="bubble"><div class="loading"><span></span><span></span><span></span></div></div>';
            } else {
                messageEl.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
            }

            chatArea.appendChild(messageEl);
            chatArea.scrollTop = chatArea.scrollHeight;
            return messageEl.id;
        }

        function removeMessage(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function loadWelcomeMessage() {
            const now = new Date();
            const month = now.getMonth();
            const key = month >= 11 || month === 0 ? 'welcomeWinter' :
                       month >= 5 && month <= 7 ? 'welcomeSummer' :
                       month === 8 || month === 9 ? 'welcomeAutumn' : 'welcome';

            addMessage(translations[currentLanguage][key], 'host');
        }

        init();
    </script>
</body>
</html>
