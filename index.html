<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prés Gaillard - Agent Virtuel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            max-height: 800px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1b5e20 0%, #2d7a2f 100%);
            color: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .header-content h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .header-content p {
            font-size: 12px;
            opacity: 0.9;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-area::-webkit-scrollbar {
            width: 6px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        /* Messages */
        .message {
            display: flex;
            margin-bottom: 8px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.host {
            justify-content: flex-start;
        }

        .message.user {
            justify-content: flex-end;
        }

        .bubble {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 15px;
        }

        .message.host .bubble {
            background: #1b5e20;
            color: white;
            border-radius: 18px 18px 18px 4px;
        }

        .message.user .bubble {
            background: #e9ecef;
            color: #333;
            border-radius: 18px 18px 4px 18px;
        }

        /* Shortcuts */
        .shortcuts {
            padding: 0 20px 16px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .shortcuts.hidden {
            display: none;
        }

        .shortcut-btn {
            padding: 10px 12px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            color: #333;
            font-weight: 500;
        }

        .shortcut-btn:hover {
            background: #1b5e20;
            color: white;
            border-color: #1b5e20;
            transform: translateY(-2px);
        }

        /* Input Area */
        .input-area {
            border-top: 1px solid #eee;
            padding: 12px 16px;
            background: #fafafa;
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            background: white;
            border: 1px solid #ddd;
            border-radius: 24px;
            padding: 0 16px;
            transition: border-color 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: #1b5e20;
            box-shadow: 0 0 0 2px rgba(27, 94, 32, 0.1);
        }

        textarea {
            flex: 1;
            border: none;
            outline: none;
            padding: 10px 0;
            resize: none;
            max-height: 100px;
            font-family: inherit;
            font-size: 15px;
            background: transparent;
            color: #333;
        }

        textarea::placeholder {
            color: #aaa;
        }

        .send-btn {
            background: #1b5e20;
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            background: #0d3d1a;
            transform: scale(1.1);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .loading span {
            width: 8px;
            height: 8px;
            background: #1b5e20;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .loading span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% { opacity: 0.5; transform: translateY(0); }
            40% { opacity: 1; transform: translateY(-8px); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                max-height: 100vh;
                border-radius: 0;
            }

            .bubble {
                max-width: 90%;
            }

            .shortcuts {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-content">
                <h1>Prés Gaillard</h1>
                <p>Gîte à La Bresse</p>
            </div>
            <div class="status">
                <div class="status-dot"></div>
                <span>En ligne</span>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area" id="chatArea"></div>

        <!-- Shortcuts -->
        <div class="shortcuts" id="shortcuts">
            <button class="shortcut-btn" data-prompt="Quelles sont les activités disponibles à La Bresse ?">🏔️ Activités</button>
            <button class="shortcut-btn" data-prompt="Quels sont les horaires d'accès au chalet ?">🕐 Horaires</button>
            <button class="shortcut-btn" data-prompt="Comment se passe le check-in ?">🔑 Check-in</button>
            <button class="shortcut-btn" data-prompt="Y a-t-il une cuisine équipée ?">🍳 Cuisine</button>
            <button class="shortcut-btn" data-prompt="Que faire en cas d'urgence ?">🆘 Urgence</button>
            <button class="shortcut-btn" data-prompt="Où manger à proximité ?">🍽️ Restaurants</button>
            <button class="shortcut-btn" data-prompt="Comment accéder au WiFi ?">📡 WiFi</button>
            <button class="shortcut-btn" data-prompt="Quelle est la politique d'annulation ?">❌ Annulation</button>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="messageInput" placeholder="Votre message..." rows="1"></textarea>
            </div>
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const shortcuts = document.getElementById('shortcuts');
        const shortcutBtns = document.querySelectorAll('.shortcut-btn');

        let isLoading = false;
        let hasInteracted = false;

        // Auto-resize textarea
        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 100) + 'px';
        });

        // Send on Enter (not Shift+Enter)
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        shortcutBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                messageInput.value = btn.dataset.prompt;
                messageInput.style.height = 'auto';
                sendMessage();
            });
        });

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isLoading) return;

            // Add user message
            addMessage(message, 'user');
            messageInput.value = '';
            messageInput.style.height = 'auto';
            isLoading = true;
            sendBtn.disabled = true;

            // Hide shortcuts after first message
            if (!hasInteracted) {
                shortcuts.classList.add('hidden');
                hasInteracted = true;
            }

            // Show loading indicator
            const loadingId = addMessage('', 'host', true);

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                removeMessage(loadingId);

                if (data.error) {
                    addMessage('Erreur: ' + data.error, 'host');
                } else {
                    addMessage(data.reply, 'host');
                }
            } catch (error) {
                removeMessage(loadingId);
                addMessage('Désolé, une erreur s\'est produite. Veuillez réessayer.', 'host');
                console.error('Error:', error);
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        function addMessage(text, sender, isLoading = false) {
            const messageEl = document.createElement('div');
            messageEl.className = `message ${sender}`;
            messageEl.id = 'msg-' + Date.now() + Math.random();

            if (isLoading) {
                messageEl.innerHTML = '<div class="bubble"><div class="loading"><span></span><span></span><span></span></div></div>';
            } else {
                messageEl.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
            }

            chatArea.appendChild(messageEl);
            chatArea.scrollTop = chatArea.scrollHeight;
            return messageEl.id;
        }

        function removeMessage(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load welcome message
        function loadWelcomeMessage() {
            const now = new Date();
            const month = now.getMonth();
            let welcome;

            if (month >= 11 || month === 0) {
                welcome = '🎄 Bienvenue à Prés Gaillard ! Passez un merveilleux séjour hivernal à La Bresse. Comment puis-je vous aider ?';
            } else if (month >= 5 && month <= 7) {
                welcome = '☀️ Bienvenue à Prés Gaillard ! Profitez de l\'été en montagne. Que puis-je faire pour vous ?';
            } else if (month === 8 || month === 9) {
                welcome = '🍂 Bienvenue à Prés Gaillard ! Les feuilles d\'automne sont magnifiques. Comment puis-je vous aider ?';
            } else {
                welcome = '🌸 Bienvenue à Prés Gaillard ! Profitez de votre séjour printanier. Que puis-je faire pour vous ?';
            }

            addMessage(welcome, 'host');
        }

        // Initialize
        loadWelcomeMessage();
        messageInput.focus();
    </script>
</body>
</html>
